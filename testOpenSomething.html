<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flutter WebView 交互示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        button {
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #1e3c2c;
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #5c3a1e;
            box-shadow: 0 4px 15px rgba(250, 112, 154, 0.4);
        }
        
        .message-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
            text-align: left;
        }
        
        .message-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .message-content {
            color: #333;
            font-size: 14px;
            word-break: break-word;
        }
        
        .response-area {
            background: #e8f5e9;
            border-left-color: #4caf50;
            margin-top: 15px;
        }
        
        .response-area .message-label {
            color: #4caf50;
        }
        
        .emoji {
            font-size: 24px;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .loading {
            animation: pulse 1s infinite;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            button {
                padding: 14px 20px;
                font-size: 16px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Flutter 交互</h1>
        <div class="subtitle">点击按钮调用 Flutter 原生方法</div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="callFlutterMethod('showMessage', 'Hello from WebView! 🚀')">
                <span class="emoji">💬</span>
                显示消息
            </button>
            
            <button class="btn-success" onclick="callFlutterMethod('getUserInfo', '')">
                <span class="emoji">👤</span>
                获取用户信息
            </button>
            
            <button class="btn-warning" onclick="callFlutterMethod('openCamera', '')">
                <span class="emoji">📷</span>
                打开相机
            </button>
        </div>
        
        <div class="message-area">
            <div class="message-label">📨 发送的消息</div>
            <div class="message-content" id="sentMessage">等待点击按钮...</div>
        </div>
        
        <div class="message-area response-area">
            <div class="message-label">✅ Flutter 返回</div>
            <div class="message-content" id="responseMessage">等待 Flutter 响应...</div>
        </div>
    </div>

    <script>
        // 调用 Flutter 方法的函数
        function callFlutterMethod(method, params) {
            // 显示正在发送的消息
            const sentDiv = document.getElementById('sentMessage');
            const responseDiv = document.getElementById('responseMessage');
            
            sentDiv.innerHTML = `正在调用: ${method}<br>参数: ${params || '无'}`;
            responseDiv.innerHTML = '<span class="loading">等待 Flutter 响应...</span>';
            
            // 检查 Flutter 通道是否可用
            if (window.FlutterChannel && typeof window.FlutterChannel.postMessage === 'function') {
                // 使用 JavaScriptChannel 方式
                const message = JSON.stringify({
                    method: method,
                    params: params,
                    timestamp: new Date().toISOString()
                });
                window.FlutterChannel.postMessage(message);
                console.log('已通过 FlutterChannel 发送:', message);
            } 
            // 备用方案：使用 prompt（旧版兼容）
            else if (typeof prompt === 'function') {
                const message = JSON.stringify({
                    method: method,
                    params: params,
                    timestamp: new Date().toISOString()
                });
                const result = prompt('flutter_message', message);
                if (result) {
                    try {
                        const data = JSON.parse(result);
                        responseDiv.innerHTML = JSON.stringify(data, null, 2);
                    } catch(e) {
                        responseDiv.innerHTML = result;
                    }
                }
            }
            else {
                responseDiv.innerHTML = '❌ Flutter 通道不可用，请检查 WebView 配置';
                console.error('Flutter channel not available');
            }
        }
        
        // 供 Flutter 调用的方法（接收 Flutter 的回调）
        window.receiveFromFlutter = function(data) {
            const responseDiv = document.getElementById('responseMessage');
            try {
                const parsed = typeof data === 'string' ? JSON.parse(data) : data;
                responseDiv.innerHTML = JSON.stringify(parsed, null, 2);
                console.log('收到 Flutter 消息:', parsed);
            } catch(e) {
                responseDiv.innerHTML = data;
            }
        };
        
        // 页面加载完成后的处理
        document.addEventListener('DOMContentLoaded', function() {
            console.log('HTML 加载完成，Flutter 交互已准备就绪');
            
            // 通知 Flutter WebView 已准备好
            if (window.FlutterChannel && typeof window.FlutterChannel.postMessage === 'function') {
                window.FlutterChannel.postMessage(JSON.stringify({
                    type: 'ready',
                    message: 'WebView ready'
                }));
            }
        });
    </script>
</body>
</html>
